    <circle cx="256" cy="256" r="190" fill="url(#edgeShadow)"/>
    <circle cx="256" cy="256" r="176" fill="url(#rimGold)"/>
    <circle cx="256" cy="256" r="153" fill="url(#coinFace)"/>

    <g clip-path="url(#coinClip)" opacity="0.5">
      <path d="M89 284C154 222 216 144 321 93" stroke="#FFF7B8" stroke-width="18" stroke-linecap="round"/>
      <path d="M160 421C245 368 330 288 422 171" stroke="#5E320D" stroke-width="20" stroke-linecap="round" opacity="0.22"/>
      <path d="M128 163C213 197 310 194 398 138" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.28"/>
    </g>

    <circle cx="256" cy="256" r="176" stroke="#FFF1A5" stroke-width="5"/>
    <circle cx="256" cy="256" r="153" stroke="#6B3A0F" stroke-width="8" opacity="0.42"/>
    <circle cx="256" cy="256" r="134" stroke="#FFE27B" stroke-width="3" stroke-dasharray="10 16" opacity="0.72"/>

    <g opacity="0.78">
      <path d="M256 79L266 103L292 105L272 122L278 148L256 134L234 148L240 122L220 105L246 103L256 79Z" fill="#FFF0A3"/>
      <path d="M256 364L266 388L292 390L272 407L278 433L256 419L234 433L240 407L220 390L246 388L256 364Z" fill="#C47C22"/>
      <path d="M79 256L103 246L105 220L122 240L148 234L134 256L148 278L122 272L105 292L103 266L79 256Z" fill="#D99B33"/>
      <path d="M433 256L409 246L407 220L390 240L364 234L378 256L364 278L390 272L407 292L409 266L433 256Z" fill="#FFE784"/>
    </g>

    <g filter="url(#engravedText)">
      <text x="256" y="292" text-anchor="middle" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="106" font-weight="800" letter-spacing="8" fill="#5A2F0B" opacity="0.55">UKI</text>
      <text x="256" y="284" text-anchor="middle" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="106" font-weight="800" letter-spacing="8" fill="url(#letterGold)">UKI</text>
