<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">UKI premium economy coin</title>
  <desc id="desc">A circular golden UKI coin asset with transparent background for the Why UKI exists orbital diagram.</desc>
  <defs>
    <radialGradient id="coinFace" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 164) rotate(55) scale(346)">
      <stop offset="0" stop-color="#FFF6B6"/>
      <stop offset="0.18" stop-color="#FFE073"/>
      <stop offset="0.43" stop-color="#DFA638"/>
      <stop offset="0.68" stop-color="#9C651E"/>
      <stop offset="0.88" stop-color="#F0C24F"/>
      <stop offset="1" stop-color="#6F3E12"/>
    </radialGradient>
    <linearGradient id="rimGold" x1="132" y1="74" x2="376" y2="444" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF8C2"/>
      <stop offset="0.22" stop-color="#EAB84F"/>
      <stop offset="0.5" stop-color="#7B4714"/>
      <stop offset="0.73" stop-color="#FFD86D"/>
      <stop offset="1" stop-color="#8A5017"/>
    </linearGradient>
    <linearGradient id="edgeShadow" x1="111" y1="93" x2="403" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF4AE"/>
      <stop offset="0.36" stop-color="#C88627"/>
      <stop offset="0.69" stop-color="#5E310D"/>
      <stop offset="1" stop-color="#E4AD3E"/>
    </linearGradient>
    <linearGradient id="letterGold" x1="158" y1="190" x2="354" y2="324" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFCE2"/>
      <stop offset="0.24" stop-color="#FFE27B"/>
      <stop offset="0.58" stop-color="#A8671C"/>
      <stop offset="0.82" stop-color="#FFE88E"/>
      <stop offset="1" stop-color="#7A4312"/>
    </linearGradient>
    <filter id="softCoinShadow" x="39" y="45" width="434" height="434" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2A1705" flood-opacity="0.32"/>
    </filter>
    <filter id="engravedText" x="110" y="165" width="292" height="177" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5" stdDeviation="2.2" flood-color="#3B1E07" flood-opacity="0.62"/>
      <feDropShadow dx="0" dy="-2" stdDeviation="1.1" flood-color="#FFF5B8" flood-opacity="0.7"/>
    </filter>
    <clipPath id="coinClip">
