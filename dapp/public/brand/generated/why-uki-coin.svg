    <path d="M132 174C161 119 215 89 280 91" stroke="#FFF7C2" stroke-width="10" stroke-linecap="round" opacity="0.82"/>
    <path d="M345 392C302 421 236 427 183 400" stroke="#4A2609" stroke-width="9" stroke-linecap="round" opacity="0.26"/>
