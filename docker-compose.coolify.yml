services:
  dapp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CUKIES_SERVICE: dapp
        NEXT_PUBLIC_UKI_CHAIN_ID: ${NEXT_PUBLIC_UKI_CHAIN_ID:-56}
        NEXT_PUBLIC_ASM_TOKEN_ADDRESS: ${NEXT_PUBLIC_ASM_TOKEN_ADDRESS:-0x707F0f4a39a4a26239F7D00463B15AB5656861f9}
        NEXT_PUBLIC_UKI_TOKEN_ADDRESS: ${NEXT_PUBLIC_UKI_TOKEN_ADDRESS:-0x51646bc7A6359f88A79FDC8d7ACB735f1AbF67fA}
        NEXT_PUBLIC_UKI_VESTING_VAULT_ADDRESS: ${NEXT_PUBLIC_UKI_VESTING_VAULT_ADDRESS:-0x95780d891461e3183562B5D785f2D2c1c72ecE65}
        NEXT_PUBLIC_UKI_PRESALE_ADDRESS: ${NEXT_PUBLIC_UKI_PRESALE_ADDRESS:-0x6E29448282bCc1c568Ec9450Bef50a01d67845C2}
        NEXT_PUBLIC_BSCSCAN_BASE_URL: ${NEXT_PUBLIC_BSCSCAN_BASE_URL:-https://bscscan.com}
        NEXT_PUBLIC_UKI_PRESALE_START_ISO: ${NEXT_PUBLIC_UKI_PRESALE_START_ISO:-2026-06-18T15:00:00.000Z}
        NEXT_PUBLIC_UKI_PRESALE_START_LABEL: ${NEXT_PUBLIC_UKI_PRESALE_START_LABEL:-18 de junio de 2026 a las 15:00 UTC}
        NEXT_PUBLIC_UKI_PRESALE_START_SHORT_LABEL: ${NEXT_PUBLIC_UKI_PRESALE_START_SHORT_LABEL:-18 jun a las 15:00 UTC}
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}
    environment:
      CUKIES_SERVICE: dapp
      NODE_ENV: production
      APP_ENV: ${APP_ENV:?Set APP_ENV in Coolify environment variables}
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      CUKIES_DATABASE_URL: ${CUKIES_DATABASE_URL:-}
      CHAIN_INDEXER_MONGO_URL: ${CHAIN_INDEXER_MONGO_URL:-${DATABASE_URL}}
      CHAIN_INDEXER_DB_NAME: ${CHAIN_INDEXER_DB_NAME:-cukieshub-new}
      CHAIN_INDEXER_PRESALE_ADDRESS: ${CHAIN_INDEXER_PRESALE_ADDRESS:-${NEXT_PUBLIC_UKI_PRESALE_ADDRESS:-}}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      AUTH_URL: ${AUTH_URL:-}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_INVITE_URL: ${DISCORD_INVITE_URL:-}
      TWITTER_CLIENT_ID: ${TWITTER_CLIENT_ID:-}
      TWITTER_CLIENT_SECRET: ${TWITTER_CLIENT_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_GROUP_INVITE: ${TELEGRAM_GROUP_INVITE:-}
      NEXT_PUBLIC_TWITTER_PROFILE_URL: ${NEXT_PUBLIC_TWITTER_PROFILE_URL:-}
      NEXT_PUBLIC_DISCORD_INVITE_URL: ${NEXT_PUBLIC_DISCORD_INVITE_URL:-}
      IFTTT_WEBHOOK_SECRET: ${IFTTT_WEBHOOK_SECRET:-}
      GAME_SYBILSLASH: ${GAME_SYBILSLASH:-}
      TREASURE_HUNT_MULTIPLAYER_ENABLED: ${TREASURE_HUNT_MULTIPLAYER_ENABLED:-false}
      TREASURE_HUNT_COMPETITION_ENABLED: ${TREASURE_HUNT_COMPETITION_ENABLED:-false}
      TREASURE_HUNT_COMPETITION_ID: ${TREASURE_HUNT_COMPETITION_ID:-}
      TREASURE_HUNT_COMPETITION_RULES_VERSION: ${TREASURE_HUNT_COMPETITION_RULES_VERSION:-1}
      TREASURE_HUNT_COMPETITION_PRESALE_ADDRESS: ${TREASURE_HUNT_COMPETITION_PRESALE_ADDRESS:-}
      TREASURE_HUNT_COMPETITION_STARTS_AT: ${TREASURE_HUNT_COMPETITION_STARTS_AT:-}
      TREASURE_HUNT_COMPETITION_ENDS_AT: ${TREASURE_HUNT_COMPETITION_ENDS_AT:-}
      TREASURE_HUNT_COMPETITION_PROOF_SECRET: ${TREASURE_HUNT_COMPETITION_PROOF_SECRET:-}
      TREASURE_HUNT_COMPETITION_ALIAS_SECRET: ${TREASURE_HUNT_COMPETITION_ALIAS_SECRET:-}
      TREASURE_HUNT_COMPETITION_REVIEW_SECRET: ${TREASURE_HUNT_COMPETITION_REVIEW_SECRET:-}
      TREASURE_HUNT_COMPETITION_SETTLEMENT_SECRET: ${TREASURE_HUNT_COMPETITION_SETTLEMENT_SECRET:-}
      NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY:-}
      NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER:-}
      PUSHER_APP_ID: ${PUSHER_APP_ID:-}
      PUSHER_KEY: ${PUSHER_KEY:-}
      PUSHER_SECRET: ${PUSHER_SECRET:-}
      PUSHER_CLUSTER: ${PUSHER_CLUSTER:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      NEXT_PUBLIC_UKI_CHAIN_ID: ${NEXT_PUBLIC_UKI_CHAIN_ID:-56}
      NEXT_PUBLIC_ASM_TOKEN_ADDRESS: ${NEXT_PUBLIC_ASM_TOKEN_ADDRESS:-0x707F0f4a39a4a26239F7D00463B15AB5656861f9}
      NEXT_PUBLIC_UKI_TOKEN_ADDRESS: ${NEXT_PUBLIC_UKI_TOKEN_ADDRESS:-0x51646bc7A6359f88A79FDC8d7ACB735f1AbF67fA}
      NEXT_PUBLIC_UKI_VESTING_VAULT_ADDRESS: ${NEXT_PUBLIC_UKI_VESTING_VAULT_ADDRESS:-0x95780d891461e3183562B5D785f2D2c1c72ecE65}
      NEXT_PUBLIC_UKI_PRESALE_ADDRESS: ${NEXT_PUBLIC_UKI_PRESALE_ADDRESS:-0x6E29448282bCc1c568Ec9450Bef50a01d67845C2}
      NEXT_PUBLIC_BSCSCAN_BASE_URL: ${NEXT_PUBLIC_BSCSCAN_BASE_URL:-https://bscscan.com}
      NEXT_PUBLIC_UKI_PRESALE_START_ISO: ${NEXT_PUBLIC_UKI_PRESALE_START_ISO:-2026-06-18T15:00:00.000Z}
      NEXT_PUBLIC_UKI_PRESALE_START_LABEL: ${NEXT_PUBLIC_UKI_PRESALE_START_LABEL:-18 de junio de 2026 a las 15:00 UTC}
      NEXT_PUBLIC_UKI_PRESALE_START_SHORT_LABEL: ${NEXT_PUBLIC_UKI_PRESALE_START_SHORT_LABEL:-18 jun a las 15:00 UTC}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}
    ports:
      - "3000"
    label_file:
      - ${CUKIES_DAPP_TRAEFIK_LABEL_FILE:?Set CUKIES_DAPP_TRAEFIK_LABEL_FILE in Coolify environment variables}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - coolify

  chain-indexer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CUKIES_SERVICE: chain-indexer
    environment:
      CUKIES_SERVICE: chain-indexer
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      CUKIES_DATABASE_URL: ${CUKIES_DATABASE_URL:-}
      CHAIN_INDEXER_MONGO_URL: ${CHAIN_INDEXER_MONGO_URL:-${DATABASE_URL}}
      CHAIN_INDEXER_DB_NAME: ${CHAIN_INDEXER_DB_NAME:-cukieshub-new}
      CHAIN_INDEXER_CHAINS: ${CHAIN_INDEXER_CHAINS:-BSC}
      CHAIN_INDEXER_CONTRACT_ALIASES: ${CHAIN_INDEXER_CONTRACT_ALIASES:-PRESALE}
      CHAIN_INDEXER_BSC_RPC_URL: ${CHAIN_INDEXER_BSC_RPC_URL:-https://bsc.rpc.blxrbdn.com}
      CHAIN_INDEXER_PRESALE_ADDRESS: ${CHAIN_INDEXER_PRESALE_ADDRESS:-${NEXT_PUBLIC_UKI_PRESALE_ADDRESS:-}}
      CHAIN_INDEXER_START_BSC_BLOCK: ${CHAIN_INDEXER_START_BSC_BLOCK:-0}
      CHAIN_INDEXER_BSC_CONFIRMATIONS: ${CHAIN_INDEXER_BSC_CONFIRMATIONS:-3}
      CHAIN_INDEXER_MAX_BLOCK_RANGE: ${CHAIN_INDEXER_MAX_BLOCK_RANGE:-5000}
      CHAIN_INDEXER_TRON_API_BASE_URL: ${CHAIN_INDEXER_TRON_API_BASE_URL:-https://api.trongrid.io/v1}
      TRON_API_KEY: ${TRON_API_KEY:-}
      TRONGRID_API_KEY: ${TRONGRID_API_KEY:-}
      CHAIN_INDEXER_POLL_INTERVAL_MS: ${CHAIN_INDEXER_POLL_INTERVAL_MS:-60000}
    restart: unless-stopped

  cuki-card-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CUKIES_SERVICE: cuki-card-worker
    environment:
      CUKIES_SERVICE: cuki-card-worker
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      CARD_WORKER_MONGO_URL: ${CARD_WORKER_MONGO_URL:-${DATABASE_URL}}
      CARD_WORKER_DB_NAME: ${CARD_WORKER_DB_NAME:-cukieshub-new}
      CARD_WORKER_UPLOAD: ${CARD_WORKER_UPLOAD:-true}
      CARD_WORKER_PUBLIC_BASE_URL: ${CARD_WORKER_PUBLIC_BASE_URL}
      CARD_WORKER_S3_BUCKET: ${CARD_WORKER_S3_BUCKET}
      CARD_WORKER_S3_REGION: ${CARD_WORKER_S3_REGION}
      CARD_WORKER_S3_PREFIX: ${CARD_WORKER_S3_PREFIX}
      CARD_WORKER_S3_ACL: ${CARD_WORKER_S3_ACL:-public-read}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-${CARD_WORKER_S3_REGION}}
    restart: unless-stopped

networks:
  coolify:
    external: true
